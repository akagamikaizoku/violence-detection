<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - Violence Detection System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='animations.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='enhancements.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">
    <i class="fas fa-moon"></i>
  </button>
  <div class="container">
    <header class="dashboard-header">
      <div class="header-left">
        <div class="logo-icon">
          <i class="fas fa-shield-alt"></i>
        </div>
        <div>
          <h1>Violence Detection System</h1>
          <p class="header-subtitle">Real-time Monitoring Dashboard</p>
        </div>
      </div>
      <div class="header-right">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span class="status-text" id="status-text">Connecting...</span>
        </div>
        <div class="user-info">
          <i class="fas fa-user-circle"></i>
          <span>Admin</span>
        </div>
      </div>
    </header>

    <div class="controls-section">
      <div class="search-container">
        <i class="fas fa-search search-icon"></i>
        <input type="text" id="search" placeholder="Search logs (ALERT, ERROR, WARNING...)" />
        <button class="search-btn" onclick="applyFilter()">
          <i class="fas fa-search"></i>
        </button>
      </div>
      
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter-btn alert-filter" data-filter="alert" onclick="setFilter('alert')">Alerts</button>
        <button class="filter-btn warning-filter" data-filter="warning" onclick="setFilter('warning')">Warnings</button>
        <button class="filter-btn info-filter" data-filter="info" onclick="setFilter('info')">Info</button>
      </div>

      <div class="action-buttons">
        <button class="btn refresh-btn" onclick="fetchLogs()">
          <i class="fas fa-sync-alt"></i>
          Refresh
        </button>
        <button class="btn download-btn" onclick="downloadLogs()">
          <i class="fas fa-download"></i>
          Download
        </button>
        <button class="btn clear-btn" onclick="clearLogs()">
          <i class="fas fa-trash-alt"></i>
          Clear
        </button>
        <a class="btn logout-btn" href="{{ url_for('logout') }}">
          <i class="fas fa-sign-out-alt"></i>
          Logout
        </a>
      </div>
    </div>

    <div class="stats-section">
      <div class="stat-card">
        <div class="stat-icon"><i class="fas fa-list"></i></div>
        <div class="stat-content">
          <div class="stat-number" id="total-logs">0</div>
          <div class="stat-label">Total Logs</div>
        </div>
      </div>
      <div class="stat-card alert">
        <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="stat-content">
          <div class="stat-number" id="alert-count">0</div>
          <div class="stat-label">Alerts</div>
        </div>
      </div>
      <div class="stat-card warning">
        <div class="stat-icon"><i class="fas fa-exclamation-circle"></i></div>
        <div class="stat-content">
          <div class="stat-number" id="warning-count">0</div>
          <div class="stat-label">Warnings</div>
        </div>
      </div>
      <div class="stat-card info">
        <div class="stat-icon"><i class="fas fa-info-circle"></i></div>
        <div class="stat-content">
          <div class="stat-number" id="info-count">0</div>
          <div class="stat-label">Info</div>
        </div>
      </div>
    </div>

    <div class="log-section">
      <div class="log-header">
        <h2><i class="fas fa-stream"></i> Live Logs</h2>
        <div class="log-controls">
          <button class="toggle-btn" onclick="toggleAutoScroll()" id="auto-scroll-btn">
            <i class="fas fa-thumbtack"></i>
            Auto-scroll: ON
          </button>
          <button class="toggle-btn" onclick="togglePause()" id="pause-btn">
            <i class="fas fa-pause"></i>
            Pause
          </button>
        </div>
      </div>
      
      <div id="log-box" class="log-container">
        <div class="loading-spinner">
          <div class="spinner"></div>
          <p>Loading logs...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='utils.js') }}"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
